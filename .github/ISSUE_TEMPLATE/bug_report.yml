name: Bug Report
description: Create a report to help us improve the learning engine
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Input '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g. macOS, Windows, Linux
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      description: What version of Bun are you using? (Run `bun --version`)
    validations:
      required: true
  - type: input
    id: cli-used
    attributes:
      label: Agent / CLI Used
      description: e.g. Claude Code, Gemini CLI, OpenCode, Qwen (if applicable)
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here, including logs or screenshots.
